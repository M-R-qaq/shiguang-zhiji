version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shiguang-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - shiguang-data:/app/data
      - shiguang-chroma:/app/chroma_db
      - whisper-cache:/root/.cache/whisper
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/shiguang.db
      - HOST=0.0.0.0
      - PORT=8000
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  shiguang-data:
  shiguang-chroma:
  whisper-cache:
