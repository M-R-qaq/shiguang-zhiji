<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食光知己 - 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/static/style.css">
</head>
<body>
    <div id="login-page">
        <div class="login-bg">
            <div class="login-blob blob-1"></div>
            <div class="login-blob blob-2"></div>
            <div class="login-blob blob-3"></div>
        </div>
        <div class="login-card">
            <div class="login-brand">
                <div class="login-logo">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="32" cy="32" r="30" stroke="#cdaa64" stroke-width="2"/>
                        <circle cx="32" cy="32" r="8" fill="#cdaa64"/>
                        <line x1="32" y1="8" x2="32" y2="20" stroke="#cdaa64" stroke-width="2" stroke-linecap="round"/>
                        <line x1="32" y1="44" x2="32" y2="56" stroke="#cdaa64" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="32" x2="20" y2="32" stroke="#cdaa64" stroke-width="2" stroke-linecap="round"/>
                        <line x1="44" y1="32" x2="56" y2="32" stroke="#cdaa64" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1 class="login-title">食光知己</h1>
                <p class="login-subtitle">管理后台</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="login-username" class="input input-with-icon" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="login-password" class="input input-with-icon" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                </div>
                <div id="login-error" class="error-msg" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                    <span>登录</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-logo">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="32" cy="32" r="30" stroke="#cdaa64" stroke-width="2"/>
                            <circle cx="32" cy="32" r="8" fill="#cdaa64"/>
                            <line x1="32" y1="8" x2="32" y2="20" stroke="#cdaa64" stroke-width="2" stroke-linecap="round"/>
                            <line x1="32" y1="44" x2="32" y2="56" stroke="#cdaa64" stroke-width="2" stroke-linecap="round"/>
                            <line x1="8" y1="32" x2="20" y2="32" stroke="#cdaa64" stroke-width="2" stroke-linecap="round"/>
                            <line x1="44" y1="32" x2="56" y2="32" stroke="#cdaa64" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="brand-name">食光知己</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-section-title">概览</span>
                    <a class="nav-item active" data-page="dashboard">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7" rx="1"/>
                                <rect x="14" y="3" width="7" height="7" rx="1"/>
                                <rect x="14" y="14" width="7" height="7" rx="1"/>
                                <rect x="3" y="14" width="7" height="7" rx="1"/>
                            </svg>
                        </span>
                        <span class="nav-text">仪表盘</span>
                    </a>
                </div>
                <div class="nav-section">
                    <span class="nav-section-title">管理</span>
                    <a class="nav-item" data-page="users">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                            </svg>
                        </span>
                        <span class="nav-text">用户管理</span>
                    </a>
                    <a class="nav-item" data-page="announcements">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                        </span>
                        <span class="nav-text">公告管理</span>
                    </a>
                    <a class="nav-item" data-page="admins" id="nav-admins" style="display:none;">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                            </svg>
                        </span>
                        <span class="nav-text">管理员</span>
                    </a>
                </div>
                <div class="nav-section">
                    <span class="nav-section-title">系统</span>
                    <a class="nav-item" data-page="config">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                            </svg>
                        </span>
                        <span class="nav-text">系统配置</span>
                    </a>
                    <a class="nav-item" data-page="audit-logs">
                        <span class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                                <polyline points="10 9 9 9 8 9"/>
                            </svg>
                        </span>
                        <span class="nav-text">审计日志</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="version">v0.8.0</div>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-left">
                    <div class="page-breadcrumb">
                        <span class="breadcrumb-current" id="page-title">仪表盘</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="admin-info">
                        <div class="admin-avatar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div class="admin-details">
                            <span id="admin-name" class="admin-name"></span>
                            <span id="admin-role" class="role-badge"></span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <div class="theme-toggle" id="btn-theme-toggle" title="切换主题">
                            <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"/>
                                <line x1="12" y1="1" x2="12" y2="3"/>
                                <line x1="12" y1="21" x2="12" y2="23"/>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                                <line x1="1" y1="12" x2="3" y2="12"/>
                                <line x1="21" y1="12" x2="23" y2="12"/>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                            </svg>
                            <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                            </svg>
                            <span id="theme-label">日间模式</span>
                        </div>
                        <button class="btn btn-ghost btn-sm" id="btn-change-pwd">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                            修改密码
                        </button>
                        <button class="btn btn-ghost btn-danger btn-sm" id="btn-logout">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            退出登录
                        </button>
                    </div>
                </div>
            </header>

            <main class="content-area">
                <section id="page-dashboard" class="page-section active">
                    <div class="stats-grid" id="dashboard-cards"></div>
                    <div class="stats-row" id="dashboard-cards-row2"></div>
                </section>

                <section id="page-users" class="page-section">
                    <div class="page-card">
                        <div class="page-card-header">
                            <h3 class="page-card-title">用户列表</h3>
                            <div class="toolbar">
                                <div class="search-box">
                                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"/>
                                        <path d="m21 21-4.35-4.35"/>
                                    </svg>
                                    <input type="text" id="user-search" class="input input-search" placeholder="搜索用户名或昵称...">
                                </div>
                                <select id="user-status-filter" class="input select select-sm">
                                    <option value="">全部状态</option>
                                    <option value="true">已激活</option>
                                    <option value="false">已停用</option>
                                </select>
                                <button class="btn btn-primary btn-sm" id="btn-search-users">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"/>
                                        <path d="m21 21-4.35-4.35"/>
                                    </svg>
                                    搜索
                                </button>
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>用户名</th>
                                        <th>昵称</th>
                                        <th>状态</th>
                                        <th>注册时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="users-tbody"></tbody>
                            </table>
                        </div>
                        <div class="pagination" id="users-pagination"></div>
                    </div>
                </section>

                <section id="page-admins" class="page-section">
                    <div class="page-card">
                        <div class="page-card-header">
                            <h3 class="page-card-title">管理员列表</h3>
                            <button class="btn btn-primary btn-sm" id="btn-create-admin">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"/>
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                                创建管理员
                            </button>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>用户名</th>
                                        <th>显示名称</th>
                                        <th>角色</th>
                                        <th>创建时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="admins-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section id="page-config" class="page-section">
                    <div id="config-container"></div>
                </section>

                <section id="page-announcements" class="page-section">
                    <div class="page-card">
                        <div class="page-card-header">
                            <h3 class="page-card-title">公告列表</h3>
                            <button class="btn btn-primary btn-sm" id="btn-create-announcement">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"/>
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                                新建公告
                            </button>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>标题</th>
                                        <th>优先级</th>
                                        <th>状态</th>
                                        <th>发布时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="announcements-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section id="page-audit-logs" class="page-section">
                    <div class="page-card">
                        <div class="page-card-header">
                            <h3 class="page-card-title">审计日志</h3>
                            <div class="toolbar">
                                <select id="audit-action-filter" class="input select select-sm">
                                    <option value="">全部操作</option>
                                    <option value="login">登录</option>
                                    <option value="logout">登出</option>
                                    <option value="create">创建</option>
                                    <option value="update">更新</option>
                                    <option value="delete">删除</option>
                                    <option value="reset_password">重置密码</option>
                                    <option value="toggle_status">切换状态</option>
                                </select>
                                <button class="btn btn-primary btn-sm" id="btn-search-audit">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"/>
                                        <path d="m21 21-4.35-4.35"/>
                                    </svg>
                                    筛选
                                </button>
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>时间</th>
                                        <th>操作者</th>
                                        <th>操作类型</th>
                                        <th>目标类型</th>
                                        <th>目标ID</th>
                                        <th>详情</th>
                                    </tr>
                                </thead>
                                <tbody id="audit-tbody"></tbody>
                            </table>
                        </div>
                        <div class="pagination" id="audit-pagination"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal-content"></div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="/admin/static/app.js"></script>
</body>
</html>
